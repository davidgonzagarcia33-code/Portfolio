<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio - Cremallera Animada</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
            overflow-x: hidden;
        }

        /* Sección de scroll largo para la animación */
        .scroll-container {
            height: 400vh;
            position: relative;
        }

        /* Contenedor fijo de la animación */
        .animation-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            pointer-events: none;
        }

        /* Contenedor de la cremallera */
        .zipper-container {
            position: relative;
            width: 500px;
            height: 650px;
            transform-style: preserve-3d;
        }

        /* Monstruo - detrás de todo */
        .monster {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 350px;
            height: auto;
            opacity: 0;
            filter: blur(10px);
            transition: none;
            z-index: 1;
        }

        /* Cremallera cerrada - contenedor */
        .zipper-closed {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
        }

        /* Mitades de la cremallera cerrada */
        .zipper-half {
            position: absolute;
            top: 0;
            height: 100%;
            width: 50%;
            overflow: visible;
            transition: none;
        }

        .zipper-half img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            object-position: center;
        }

        .zipper-left {
            left: 0;
            transform-origin: left center;
        }

        .zipper-right {
            right: 0;
            transform-origin: right center;
        }

        /* Tiradores */
        .zipper-pull {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            z-index: 15;
            transition: none;
        }

        .zipper-pull img {
            width: 100%;
            height: auto;
        }

        .zipper-pull-top {
            top: 0;
        }

        .zipper-pull-bottom {
            bottom: 0;
        }

        /* Cremallera abierta */
        .zipper-open {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            opacity: 0;
            transition: none;
        }

        .zipper-open-half {
            position: absolute;
            top: 0;
            height: 100%;
            width: 55%;
            transition: none;
        }

        .zipper-open-half img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .zipper-open-left {
            left: -5%;
        }

        .zipper-open-right {
            right: -5%;
        }

        .zipper-open-pull {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            z-index: 8;
            opacity: 0;
            transition: none;
        }

        .zipper-open-pull img {
            width: 100%;
            height: auto;
        }

        .zipper-open-pull-top {
            top: -5%;
        }

        .zipper-open-pull-bottom {
            bottom: -5%;
        }

        /* Indicador de scroll */
        .scroll-indicator {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            z-index: 100;
            opacity: 1;
            transition: opacity 0.5s ease;
            pointer-events: none;
        }

        .scroll-indicator.hidden {
            opacity: 0;
        }

        .scroll-indicator span {
            font-size: 14px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.6);
        }

        .scroll-arrow {
            width: 30px;
            height: 30px;
            border-right: 2px solid rgba(255, 255, 255, 0.6);
            border-bottom: 2px solid rgba(255, 255, 255, 0.6);
            transform: rotate(45deg);
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {
                transform: rotate(45deg) translateY(0);
            }
            40% {
                transform: rotate(45deg) translateY(10px);
            }
            60% {
                transform: rotate(45deg) translateY(5px);
            }
        }

        /* Barra de progreso */
        .progress-bar {
            position: fixed;
            top: 0;
            left: 0;
            height: 3px;
            background: linear-gradient(90deg, #fff 0%, #888 100%);
            width: 0%;
            z-index: 1000;
            transition: width 0.1s ease-out;
        }

        /* Contenido después de la animación */
        .content-section {
            position: relative;
            z-index: 5;
            min-height: 100vh;
            padding: 100px 50px;
            background: #000;
        }

        .content-section h1 {
            font-size: 4rem;
            margin-bottom: 30px;
            opacity: 0;
            transform: translateY(50px);
            animation: fadeInUp 1s ease forwards;
        }

        .content-section p {
            font-size: 1.2rem;
            max-width: 600px;
            line-height: 1.8;
            color: rgba(255, 255, 255, 0.7);
            opacity: 0;
            transform: translateY(50px);
            animation: fadeInUp 1s ease 0.3s forwards;
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Efecto de resplandor detrás del monstruo */
        .glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            border-radius: 50%;
            opacity: 0;
            z-index: 0;
            transition: none;
        }

        /* Debug info (oculto por defecto) */
        .debug {
            position: fixed;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.8);
            padding: 10px;
            font-size: 12px;
            z-index: 9999;
            display: none;
        }
    </style>
</head>
<body>
    <div class="progress-bar" id="progressBar"></div>

    <div class="scroll-container" id="scrollContainer">
        <div class="animation-wrapper" id="animationWrapper">
            <div class="zipper-container" id="zipperContainer">
                
                <!-- Resplandor detrás del monstruo -->
                <div class="glow" id="glow"></div>
                
                <!-- Monstruo -->
                <img class="monster" id="monster" 
                     src="file:///C:/Users/Usuario/Desktop/CV Y PORTFOLIO/PORTFOLIO 2026/animacion/frame abierto/montruo.svg" 
                     alt="Monstruo">

                <!-- Cremallera abierta (aparece gradualmente) -->
                <div class="zipper-open" id="zipperOpen">
                    <div class="zipper-open-half zipper-open-left">
                        <img src="file:///C:/Users/Usuario/Desktop/CV Y PORTFOLIO/PORTFOLIO 2026/animacion/frame abierto/lado izq.svg" 
                             alt="Lado izquierdo abierto">
                    </div>
                    <div class="zipper-open-half zipper-open-right">
                        <img src="file:///C:/Users/Usuario/Desktop/CV Y PORTFOLIO/PORTFOLIO 2026/animacion/frame abierto/lado der.svg" 
                             alt="Lado derecho abierto">
                    </div>
                    <div class="zipper-open-pull zipper-open-pull-top" id="openPullTop">
                        <img src="file:///C:/Users/Usuario/Desktop/CV Y PORTFOLIO/PORTFOLIO 2026/animacion/frame abierto/cremallera top.svg" 
                             alt="Tirador arriba">
                    </div>
                    <div class="zipper-open-pull zipper-open-pull-bottom" id="openPullBottom">
                        <img src="file:///C:/Users/Usuario/Desktop/CV Y PORTFOLIO/PORTFOLIO 2026/animacion/frame abierto/cremallera abajo.svg" 
                             alt="Tirador abajo">
                    </div>
                </div>

                <!-- Cremallera cerrada (desaparece gradualmente) -->
                <div class="zipper-closed" id="zipperClosed">
                    <div class="zipper-half zipper-left" id="zipperLeft">
                        <img src="file:///C:/Users/Usuario/Desktop/CV Y PORTFOLIO/PORTFOLIO 2026/animacion/frame cerrado/lado izq.svg" 
                             alt="Lado izquierdo">
                    </div>
                    <div class="zipper-half zipper-right" id="zipperRight">
                        <img src="file:///C:/Users/Usuario/Desktop/CV Y PORTFOLIO/PORTFOLIO 2026/animacion/frame cerrado/lado der.svg" 
                             alt="Lado derecho">
                    </div>
                    <div class="zipper-pull zipper-pull-top" id="pullTop">
                        <img src="file:///C:/Users/Usuario/Desktop/CV Y PORTFOLIO/PORTFOLIO 2026/animacion/frame cerrado/cremalera arr.svg" 
                             alt="Tirador arriba">
                    </div>
                    <div class="zipper-pull zipper-pull-bottom" id="pullBottom">
                        <img src="file:///C:/Users/Usuario/Desktop/CV Y PORTFOLIO/PORTFOLIO 2026/animacion/frame cerrado/cremalera abajo.svg" 
                             alt="Tirador abajo">
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- Indicador de scroll -->
    <div class="scroll-indicator" id="scrollIndicator">
        <span>Scroll</span>
        <div class="scroll-arrow"></div>
    </div>

    <!-- Contenido después de la animación -->
    <div class="content-section" id="contentSection">
        <h1>Bienvenido</h1>
        <p>
            Soy un multidiseñador murciano apasionado por crear experiencias visuales únicas. 
            Explora mi portfolio y descubre mis trabajos de diseño gráfico, ilustración, 
            animación y mucho más.
        </p>
    </div>

    <div class="debug" id="debug"></div>

    <script>
        // Elementos
        const scrollContainer = document.getElementById('scrollContainer');
        const animationWrapper = document.getElementById('animationWrapper');
        const zipperContainer = document.getElementById('zipperContainer');
        const monster = document.getElementById('monster');
        const glow = document.getElementById('glow');
        const zipperClosed = document.getElementById('zipperClosed');
        const zipperOpen = document.getElementById('zipperOpen');
        const zipperLeft = document.getElementById('zipperLeft');
        const zipperRight = document.getElementById('zipperRight');
        const pullTop = document.getElementById('pullTop');
        const pullBottom = document.getElementById('pullBottom');
        const openPullTop = document.getElementById('openPullTop');
        const openPullBottom = document.getElementById('openPullBottom');
        const progressBar = document.getElementById('progressBar');
        const scrollIndicator = document.getElementById('scrollIndicator');
        const contentSection = document.getElementById('contentSection');
        const debug = document.getElementById('debug');

        // Función de easing para animaciones más suaves
        function easeOutCubic(t) {
            return 1 - Math.pow(1 - t, 3);
        }

        function easeInOutCubic(t) {
            return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
        }

        function easeOutExpo(t) {
            return t === 1 ? 1 : 1 - Math.pow(2, -10 * t);
        }

        // Función principal de animación basada en scroll
        function updateAnimation() {
            const scrollTop = window.scrollY;
            const scrollHeight = scrollContainer.offsetHeight - window.innerHeight;
            const progress = Math.min(Math.max(scrollTop / scrollHeight, 0), 1);
            
            // Actualizar barra de progreso
            progressBar.style.width = (progress * 100) + '%';

            // Ocultar indicador de scroll después de empezar
            if (progress > 0.05) {
                scrollIndicator.classList.add('hidden');
            } else {
                scrollIndicator.classList.remove('hidden');
            }

            // Fase 1: 0% - 30% -> Los tiradores empiezan a moverse
            // Fase 2: 20% - 60% -> La cremallera se abre (lados se separan)
            // Fase 3: 40% - 80% -> Aparece el monstruo
            // Fase 4: 70% - 100% -> Transición a cremallera abierta completa

            // === TIRADORES ===
            // Tirador superior se mueve hacia arriba
            const pullTopProgress = easeOutCubic(Math.min(Math.max((progress - 0) / 0.4, 0), 1));
            const pullTopY = -150 * pullTopProgress;
            pullTop.style.transform = `translateX(-50%) translateY(${pullTopY}px)`;
            pullTop.style.opacity = 1 - pullTopProgress;

            // Tirador inferior se mueve hacia abajo
            const pullBottomProgress = easeOutCubic(Math.min(Math.max((progress - 0) / 0.4, 0), 1));
            const pullBottomY = 150 * pullBottomProgress;
            pullBottom.style.transform = `translateX(-50%) translateY(${pullBottomY}px)`;
            pullBottom.style.opacity = 1 - pullBottomProgress;

            // === LADOS DE LA CREMALLERA CERRADA ===
            // Se separan hacia los lados
            const sidesProgress = easeOutExpo(Math.min(Math.max((progress - 0.1) / 0.5, 0), 1));
            const sideOffset = 200 * sidesProgress;
            
            zipperLeft.style.transform = `translateX(${-sideOffset}px)`;
            zipperLeft.style.opacity = 1 - sidesProgress * 0.8;
            
            zipperRight.style.transform = `translateX(${sideOffset}px)`;
            zipperRight.style.opacity = 1 - sidesProgress * 0.8;

            // === CREMALLERA ABIERTA ===
            const openProgress = easeInOutCubic(Math.min(Math.max((progress - 0.3) / 0.4, 0), 1));
            zipperOpen.style.opacity = openProgress;

            // Tiradores abiertos
            const openPullProgress = easeOutCubic(Math.min(Math.max((progress - 0.5) / 0.3, 0), 1));
            openPullTop.style.opacity = openPullProgress;
            openPullTop.style.transform = `translateX(-50%) translateY(${-30 + 30 * openPullProgress}px)`;
            openPullBottom.style.opacity = openPullProgress;
            openPullBottom.style.transform = `translateX(-50%) translateY(${30 - 30 * openPullProgress}px)`;

            // === MONSTRUO ===
            const monsterProgress = easeOutExpo(Math.min(Math.max((progress - 0.25) / 0.5, 0), 1));
            monster.style.opacity = monsterProgress;
            monster.style.filter = `blur(${10 - 10 * monsterProgress}px)`;
            monster.style.transform = `translate(-50%, -50%) scale(${0.7 + 0.3 * monsterProgress})`;

            // === RESPLANDOR ===
            const glowProgress = easeOutCubic(Math.min(Math.max((progress - 0.4) / 0.4, 0), 1));
            glow.style.opacity = glowProgress * 0.5;
            glow.style.transform = `translate(-50%, -50%) scale(${1 + glowProgress})`;

            // === OCULTAR ANIMACIÓN AL FINAL ===
            if (progress >= 0.95) {
                const fadeOut = (progress - 0.95) / 0.05;
                animationWrapper.style.opacity = 1 - fadeOut;
            } else {
                animationWrapper.style.opacity = 1;
            }

            // Debug info
            debug.innerHTML = `Progress: ${(progress * 100).toFixed(1)}%<br>
                              Scroll: ${scrollTop.toFixed(0)}px<br>
                              Monster: ${(monsterProgress * 100).toFixed(0)}%`;
        }

        // Throttle para mejor rendimiento
        let ticking = false;
        function onScroll() {
            if (!ticking) {
                requestAnimationFrame(() => {
                    updateAnimation();
                    ticking = false;
                });
                ticking = true;
            }
        }

        // Event listeners
        window.addEventListener('scroll', onScroll, { passive: true });
        window.addEventListener('resize', updateAnimation);

        // Inicializar
        updateAnimation();

        // Smooth scroll con la rueda del ratón para mejor experiencia
        let scrollTarget = 0;
        let currentScroll = 0;
        const scrollSmoothing = 0.1;

        function smoothScroll() {
            currentScroll += (scrollTarget - currentScroll) * scrollSmoothing;
            
            if (Math.abs(scrollTarget - currentScroll) > 0.5) {
                requestAnimationFrame(smoothScroll);
            }
        }
    </script>
</body>
</html>

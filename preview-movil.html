<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vista previa móvil - Portfolio</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            color: #fff;
        }
        h1 {
            font-size: 1.2rem;
            font-weight: 400;
            letter-spacing: 2px;
            margin-bottom: 30px;
            opacity: 0.8;
        }
        .phone-frame {
            width: 320px;
            height: 660px;
            background: #111;
            border-radius: 40px;
            padding: 12px;
            box-shadow:
                0 0 0 3px #333,
                0 0 0 6px #111,
                0 25px 50px -12px rgba(0,0,0,0.5),
                inset 0 0 6px rgba(255,255,255,0.05);
            position: relative;
        }
        .phone-notch {
            position: absolute;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 28px;
            background: #111;
            border-radius: 0 0 20px 20px;
            z-index: 10;
        }
        .phone-screen {
            width: 100%;
            height: 100%;
            background: #000;
            border-radius: 32px;
            overflow: hidden;
            position: relative;
        }
        .phone-screen iframe {
            width: 375px;
            height: 812px;
            border: none;
            transform: scale(0.789);
            transform-origin: top left;
            pointer-events: auto;
        }
        .page-select {
            margin-top: 25px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 400px;
        }
        .page-select a {
            padding: 10px 18px;
            background: rgba(255,255,255,0.1);
            color: #fff;
            text-decoration: none;
            font-size: 12px;
            border-radius: 8px;
            transition: all 0.2s;
        }
        .page-select a:hover,
        .page-select a.active {
            background: #EEFF00;
            color: #000;
        }
        .hint {
            margin-top: 20px;
            font-size: 11px;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <h1>Vista previa móvil</h1>
    <div class="phone-frame">
        <div class="phone-notch"></div>
        <div class="phone-screen">
            <iframe id="previewFrame" src="animacion-scroll-v6.html" title="Preview"></iframe>
        </div>
    </div>
    <div class="page-select">
        <a href="#" class="active" data-src="animacion-scroll-v6.html">Home</a>
        <a href="#" data-src="work.html">Work</a>
        <a href="#" data-src="about.html">About</a>
        <a href="#" data-src="proyecto-foam.html">Foam</a>
        <a href="#" data-src="proyecto-heinz.html">Heinz</a>
        <a href="#" data-src="proyecto-blackout.html">Blackout</a>
    </div>
    <p class="hint">Simula ~375×812px (iPhone). Abre esta página en el navegador.</p>
    <script>
        document.querySelectorAll('.page-select a').forEach(a => {
            a.addEventListener('click', function(e) {
                e.preventDefault();
                document.querySelectorAll('.page-select a').forEach(x => x.classList.remove('active'));
                this.classList.add('active');
                document.getElementById('previewFrame').src = this.dataset.src;
            });
        });
    </script>
</body>
</html>

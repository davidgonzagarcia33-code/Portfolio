<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' https://fonts.googleapis.com https://fonts.cdnfonts.com 'unsafe-inline'; font-src 'self' https://fonts.gstatic.com https://fonts.cdnfonts.com data:; img-src 'self' data: blob:; media-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), geolocation=(), interest-cohort=()">
    <title>Heinz - David González</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,300;0,400&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        a, button { -webkit-tap-highlight-color: transparent; }
        body {
            background: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
            min-height: 100vh;
        }

        .nav {
            position: fixed;
            top: 0; left: 0; width: 100%;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
        }
        .nav-logo {
            display: flex; align-items: center; gap: 0; text-decoration: none;
        }
        .nav-logo-box {
            display: flex; align-items: center; justify-content: center;
        }
        .nav-logo-box img { width: 80px; height: auto; }
        .nav-logo-name {
            height: 100px; width: auto; filter: invert(1); margin-left: -35px;
        }
        .nav-links { display: flex; gap: 40px; }
        .nav-links a {
            color: #fff; text-decoration: none; font-size: 13px;
            font-weight: 500; letter-spacing: 2px; text-transform: uppercase;
            transition: opacity 0.3s ease;
        }
        .nav-links a:hover { opacity: 0.6; }
        .music-toggle { font-size: 10px; color: rgba(255,255,255,0.4); cursor: pointer; letter-spacing: -2px; transition: color 0.2s ease; user-select: none; }
        .music-toggle:hover { color: #EEFF00; }

        .project-hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 120px 60px 60px;
        }
        .project-hero-content {
            display: flex; align-items: center; gap: 80px; max-width: 1200px;
        }
        .project-hero-video {
            width: 450px; flex-shrink: 0; border-radius: 8px; overflow: hidden;
        }
        .project-hero-video video {
            width: 100%; height: auto; display: block;
        }
        .project-info h1 {
            font-size: 3.5rem; font-weight: 200; letter-spacing: 8px;
            text-transform: uppercase; margin-bottom: 30px;
        }
        .project-info p {
            font-size: 1.1rem; line-height: 1.8;
            color: rgba(255,255,255,0.7); max-width: 500px; margin-bottom: 20px;
        }
        .project-tags { display: flex; gap: 15px; margin-top: 30px; }
        .tag {
            padding: 8px 20px; border: 1px solid rgba(255,255,255,0.3);
            font-size: 12px; letter-spacing: 2px; text-transform: uppercase;
        }

        .project-gallery {
            padding: 60px 0 120px;
            background: transparent;
        }
        .gallery-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2rem;
            letter-spacing: 8px;
            padding-left: 60px;
            margin-bottom: 40px;
        }
        .poster-track {
            position: relative;
            overflow-x: auto;
            overflow-y: hidden;
            padding: 40px 0 80px;
            cursor: grab;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        .poster-track::-webkit-scrollbar { display: none; }
        .poster-track::after {
            content: '';
            position: absolute;
            top: 0; right: 0;
            width: 150px; height: 100%;
            background: linear-gradient(to left, #000, transparent);
            pointer-events: none;
        }
        .poster-track:active { cursor: grabbing; }
        .poster-track-inner {
            display: flex;
            padding-left: 60px;
            padding-right: 100px;
        }
        .poster-item {
            flex-shrink: 0;
            width: clamp(180px, 20vw, 300px);
            aspect-ratio: 3/4;
            margin-right: -70px;
            border-radius: 4px;
            overflow: hidden;
            box-shadow: -10px 0 40px rgba(0,0,0,0.8);
            transition: transform 0.35s ease, box-shadow 0.35s ease, border 0.35s ease;
            transform: rotate(var(--rot, 0deg));
        }
        .poster-item img {
            width: 100%; height: 100%; object-fit: cover; display: block;
        }
        .poster-item:hover {
            transform: translateY(-50px) rotate(0deg) scale(1.06);
            z-index: 100;
            border: 2px solid #EEFF00;
            box-shadow: -10px 0 60px rgba(0,0,0,0.9);
        }
        .poster-track.grabbing .poster-item {
            pointer-events: none;
        }
        .poster-drag-hint {
            position: absolute;
            bottom: 20px; right: 80px;
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            letter-spacing: 3px;
            color: rgba(255,255,255,0.4);
            animation: hintBlink 2s ease-in-out infinite;
        }
        .poster-drag-hint.hidden { display: none; }
        .poster-item { cursor: pointer; }
        @keyframes hintBlink {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }
        .lightbox {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.97); z-index: 9999;
            display: flex; align-items: center; justify-content: center; padding: 60px;
            opacity: 0; visibility: hidden; transition: opacity 0.3s, visibility 0.3s;
        }
        .lightbox.active { opacity: 1; visibility: visible; }
        .lightbox img { max-width: 90vw; max-height: 85vh; width: auto; height: auto; object-fit: contain; }
        .lightbox-close {
            position: absolute; top: 30px; right: 40px;
            color: #fff; font-size: 14px; letter-spacing: 3px; cursor: pointer; opacity: 0.7;
        }
        .lightbox-close:hover { opacity: 1; }

        .back-btn {
            position: fixed; bottom: 40px; left: 40px;
            padding: 15px 30px; background: #fff; color: #000;
            text-decoration: none; font-size: 13px; font-weight: 600;
            letter-spacing: 2px; text-transform: uppercase;
            transition: all 0.3s ease; z-index: 1000;
        }
        .back-btn:hover {
            background: #000; color: #fff; border: 1px solid #fff;
        }

        @media (max-width: 768px) {
            .nav { padding: 12px 15px; }
            .nav-logo-box img { width: 50px; }
            .nav-logo-name { height: 60px; margin-left: -18px; }
            .nav-links { gap: 24px; }
            .nav-links a { font-size: 11px; }
            .project-hero { padding: 100px 20px 40px; }
            .project-hero-content { flex-direction: column; gap: 30px; }
            .project-hero-video { width: 100%; }
            .project-info h1 { font-size: 1.8rem; }
            .project-gallery { padding: 30px 20px 80px; }
            .gallery-title { padding-left: 20px; font-size: 1.4rem; }
            .poster-track { overflow-x: auto; -webkit-overflow-scrolling: touch; cursor: grab; padding: 20px 0; }
            .poster-track::after { display: none; }
            .poster-track-inner { flex-direction: row; padding: 0 20px; gap: 15px; flex-wrap: nowrap; }
            .poster-item { width: 70%; min-width: 180px; margin-right: 0; flex-shrink: 0; transform: none !important; }
            .poster-item:hover { transform: none !important; }
            .poster-drag-hint { display: block; font-size: 10px; }
            .back-btn { bottom: 20px; left: 20px; padding: 12px 24px; font-size: 11px; }
            .lightbox { padding: 40px 15px 60px; }
            .lightbox-close { top: 15px; right: 15px; padding: 12px; }
            .lightbox img { max-height: 70vh; }
        }
    </style>
</head>
<body>
    <nav class="nav">
        <a href="animacion-scroll-v6.html" class="nav-logo">
            <div class="nav-logo-box"><img src="perfil.svg" alt="Perfil"></div>
            <img src="nombre.png" alt="David González" class="nav-logo-name">
        </a>
        <div class="nav-links">
            <span id="musicToggle" class="music-toggle" onclick="toggleBgMusic()" title="Reproducir música">&#9654;</span>
            <a href="work.html">Work</a>
            <a href="about.html">About</a>
        </div>
    </nav>

    <section class="project-hero">
        <div class="project-hero-content">
            <div class="project-hero-video">
                <video src="heinz-video.mp4" muted loop playsinline preload="none"></video>
            </div>
            <div class="project-info">
                <h1>Heinz</h1>
                <p>Propuesta creativa de tipografía y dirección de contenido para Heinz. Diseño de fuente tipográfica personalizada y gráficas publicitarias para la marca.</p>
                <div class="project-tags">
                    <span class="tag">Dirección de Contenido</span>
                    <span class="tag">Tipografía</span>
                </div>
            </div>
        </div>
    </section>

    <section class="project-gallery">
        <h2 class="gallery-title">Gráficas</h2>
        <div class="poster-track" id="posterTrack">
            <div class="poster-track-inner" id="posterTrackInner">
                <div class="poster-item"><img src="heinz/portada.jpg" alt="Heinz" loading="lazy" decoding="async"></div>
                <div class="poster-item"><img src="heinz/grafica-1.jpg" alt="Heinz" loading="lazy" decoding="async"></div>
                <div class="poster-item"><img src="heinz/grafica-2.jpg" alt="Heinz" loading="lazy" decoding="async"></div>
                <div class="poster-item"><img src="heinz/grafica3.jpg" alt="Heinz" loading="lazy" decoding="async"></div>
                <div class="poster-item"><img src="heinz/3.jpg" alt="Heinz" loading="lazy" decoding="async"></div>
                <div class="poster-item"><img src="heinz/4.jpg" alt="Heinz" loading="lazy" decoding="async"></div>
            </div>
            <span class="poster-drag-hint" id="dragHint">drag →</span>
        </div>
    </section>

    <div class="lightbox" id="lightbox">
        <span class="lightbox-close" id="lightboxClose">✕ Cerrar</span>
        <img src="" alt="Gráfica ampliada" id="lightboxImg">
    </div>

    <a href="work.html" class="back-btn">← Volver</a>
    <script>
        (function() {
            var items = document.querySelectorAll('.poster-item');
            items.forEach(function(el) {
                el.style.setProperty('--rot', (Math.random() * 10 - 5) + 'deg');
            });
            var track = document.getElementById('posterTrack');
            var inner = document.getElementById('posterTrackInner');
            var hint = document.getElementById('dragHint');
            var justDragged = false;
            var lb = document.getElementById('lightbox');
            var lbImg = document.getElementById('lightboxImg');
            var lbClose = document.getElementById('lightboxClose');
            function openLightbox(src) {
                lbImg.src = src;
                lb.classList.add('active');
                document.body.style.overflow = 'hidden';
            }
            function closeLightbox() {
                lb.classList.remove('active');
                document.body.style.overflow = '';
            }
            if (lbClose) lbClose.addEventListener('click', closeLightbox);
            if (lb) lb.addEventListener('click', function(e) { if (e.target === lb) closeLightbox(); });
            document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeLightbox(); });
            inner.addEventListener('click', function(e) {
                var poster = e.target.closest('.poster-item');
                if (!poster || justDragged) return;
                var img = poster.querySelector('img');
                if (img && img.src) openLightbox(img.src);
            });
            var isDown = false, startX, scrollLeft;
            var dragThreshold = 6;
            var autoScrollSpeed = 0.8;
            var autoScrollPaused = false;

            function autoScroll() {
                if (autoScrollPaused || isDown) return;
                var maxScroll = track.scrollWidth - track.clientWidth;
                if (maxScroll <= 0) return;
                track.scrollLeft += autoScrollSpeed;
                if (track.scrollLeft >= maxScroll) track.scrollLeft = 0;
            }
            setInterval(autoScroll, 20);

            track.addEventListener('mousedown', function(e) {
                isDown = true;
                justDragged = false;
                startX = e.clientX - track.getBoundingClientRect().left;
                scrollLeft = track.scrollLeft;
                autoScrollPaused = true;
                if (hint && !hint.classList.contains('hidden')) hint.classList.add('hidden');
            });
            track.addEventListener('mouseleave', function() { isDown = false; track.classList.remove('grabbing'); });
            track.addEventListener('mouseup', function() {
                isDown = false;
                track.classList.remove('grabbing');
                autoScrollPaused = false;
            });
            track.addEventListener('mousemove', function(e) {
                if (!isDown) return;
                e.preventDefault();
                var x = e.clientX - track.getBoundingClientRect().left;
                if (Math.abs(x - startX) > dragThreshold) {
                    justDragged = true;
                    track.classList.add('grabbing');
                }
                track.scrollLeft = scrollLeft - (x - startX);
            });
            track.addEventListener('touchstart', function(e) {
                justDragged = false;
                autoScrollPaused = true;
                startX = e.touches[0].clientX - track.getBoundingClientRect().left;
                scrollLeft = track.scrollLeft;
                if (hint && !hint.classList.contains('hidden')) hint.classList.add('hidden');
            }, { passive: true });
            track.addEventListener('touchmove', function(e) {
                e.preventDefault();
                var x = e.touches[0].clientX - track.getBoundingClientRect().left;
                if (Math.abs(x - startX) > dragThreshold) justDragged = true;
                track.scrollLeft = scrollLeft - (x - startX);
            }, { passive: false });
            track.addEventListener('touchend', function() {
                setTimeout(function() { autoScrollPaused = false; }, 300);
            });
        })();
    </script>
    <script src="persistent-music.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio - Cremallera Animada v3</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
            overflow-x: hidden;
        }

        .scroll-container {
            height: 500vh;
            position: relative;
        }

        .animation-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .zipper-container {
            position: relative;
            width: 220px;
            height: 75vh;
            max-height: 720px;
        }

        /* Cremallera cerrada completa */
        .zipper-closed {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            height: 100%;
            z-index: 10;
        }

        .zipper-closed img {
            height: 100%;
            width: auto;
        }

        /* Monstruo - sale por detrás de la izquierda, por delante de la derecha */
        .monster {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.5);
            width: 300px;
            height: auto;
            opacity: 0;
            z-index: 8; /* Entre izquierda (10) y derecha (5) */
        }

        /* Resplandor */
        .glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 250px;
            height: 250px;
            background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, transparent 70%);
            border-radius: 50%;
            opacity: 0;
            z-index: 1;
        }

        /* Máscara para simular la apertura - clip-path */
        .zipper-mask {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            height: 100%;
            width: 220px;
            overflow: hidden;
            z-index: 10;
        }

        .zipper-mask img {
            height: 100%;
            width: auto;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        /* Parte izquierda de la cremallera (z-index alto, monstruo detrás) */
        .zipper-left-half {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            height: 100%;
            width: 220px;
            overflow: hidden;
            z-index: 15;
            clip-path: polygon(0 0, 50% 0, 50% 100%, 0 100%);
        }

        .zipper-left-half img {
            height: 100%;
            width: auto;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        /* Parte derecha de la cremallera (z-index bajo, monstruo delante) */
        .zipper-right-half {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            height: 100%;
            width: 220px;
            overflow: hidden;
            z-index: 5;
            clip-path: polygon(50% 0, 100% 0, 100% 100%, 50% 100%);
        }

        .zipper-right-half img {
            height: 100%;
            width: auto;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        /* Indicador de scroll */
        .scroll-indicator {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            z-index: 100;
            transition: opacity 0.5s ease;
        }

        .scroll-indicator.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .scroll-indicator span {
            font-size: 12px;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.5);
        }

        .scroll-arrow {
            width: 24px;
            height: 24px;
            border-right: 2px solid rgba(255, 255, 255, 0.5);
            border-bottom: 2px solid rgba(255, 255, 255, 0.5);
            transform: rotate(45deg);
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: rotate(45deg) translateY(0); }
            40% { transform: rotate(45deg) translateY(8px); }
            60% { transform: rotate(45deg) translateY(4px); }
        }

        /* Barra de progreso */
        .progress-bar {
            position: fixed;
            top: 0;
            left: 0;
            height: 2px;
            background: #fff;
            width: 0%;
            z-index: 1000;
        }

        /* Contenido */
        .content-section {
            position: relative;
            z-index: 5;
            min-height: 100vh;
            padding: 100px 50px;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .content-section h1 {
            font-size: 3.5rem;
            margin-bottom: 20px;
            font-weight: 300;
            letter-spacing: 5px;
        }

        .content-section p {
            font-size: 1.1rem;
            max-width: 500px;
            line-height: 1.8;
            color: rgba(255, 255, 255, 0.6);
        }

        /* Debug */
        .debug {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            padding: 10px;
            font-size: 12px;
            font-family: monospace;
            z-index: 9999;
            border: 1px solid #333;
        }
    </style>
</head>
<body>
    <div class="progress-bar" id="progressBar"></div>

    <div class="scroll-container" id="scrollContainer">
        <div class="animation-wrapper" id="animationWrapper">
            <div class="zipper-container" id="zipperContainer">
                
                <!-- Resplandor (más atrás) -->
                <div class="glow" id="glow"></div>

                <!-- Monstruo (z-index 8: detrás de izquierda, delante de derecha) -->
                <img class="monster" id="monster" 
                     src="file:///C:/Users/Usuario/Desktop/CV Y PORTFOLIO/PORTFOLIO 2026/animacion/frame abierto/montruo.svg" 
                     alt="Monstruo">

                <!-- Parte derecha de la cremallera (z-index 5: monstruo por delante) -->
                <div class="zipper-right-half" id="zipperRight">
                    <img src="file:///C:/Users/Usuario/Desktop/CV Y PORTFOLIO/PORTFOLIO 2026/animacion/frame cerrado/Recurso 6.svg" alt="">
                </div>

                <!-- Parte izquierda de la cremallera (z-index 15: monstruo por detrás) -->
                <div class="zipper-left-half" id="zipperLeft">
                    <img src="file:///C:/Users/Usuario/Desktop/CV Y PORTFOLIO/PORTFOLIO 2026/animacion/frame cerrado/Recurso 6.svg" alt="">
                </div>

            </div>
        </div>
    </div>

    <div class="scroll-indicator" id="scrollIndicator">
        <span>Scroll</span>
        <div class="scroll-arrow"></div>
    </div>

    <div class="content-section" id="contentSection">
        <h1>BIENVENIDO</h1>
        <p>
            Soy un multidiseñador murciano apasionado por crear experiencias visuales únicas. 
            Explora mi portfolio y descubre mis trabajos.
        </p>
    </div>

    <div class="debug" id="debug"></div>

    <script>
        const scrollContainer = document.getElementById('scrollContainer');
        const animationWrapper = document.getElementById('animationWrapper');
        const monster = document.getElementById('monster');
        const glow = document.getElementById('glow');
        const zipperLeft = document.getElementById('zipperLeft');
        const zipperRight = document.getElementById('zipperRight');
        const progressBar = document.getElementById('progressBar');
        const scrollIndicator = document.getElementById('scrollIndicator');
        const debug = document.getElementById('debug');

        // Easing functions
        function easeOutCubic(t) {
            return 1 - Math.pow(1 - t, 3);
        }

        function easeInOutCubic(t) {
            return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
        }

        function easeOutExpo(t) {
            return t === 1 ? 1 : 1 - Math.pow(2, -10 * t);
        }

        function easeOutQuart(t) {
            return 1 - Math.pow(1 - t, 4);
        }

        function updateAnimation() {
            const scrollTop = window.scrollY;
            const scrollHeight = scrollContainer.offsetHeight - window.innerHeight;
            const progress = Math.min(Math.max(scrollTop / scrollHeight, 0), 1);
            
            progressBar.style.width = (progress * 100) + '%';

            // Ocultar indicador
            if (progress > 0.02) {
                scrollIndicator.classList.add('hidden');
            } else {
                scrollIndicator.classList.remove('hidden');
            }

            // === APERTURA DE LA CREMALLERA ===
            // La cremallera se abre desde el centro hacia arriba y abajo
            // Pero NO se abre del todo - quedan 2-3 eslabones unidos (aprox 5% arriba y 5% abajo)
            
            const openProgress = easeOutQuart(Math.min(Math.max(progress / 0.7, 0), 1));
            
            // Apertura máxima: desde 5% hasta 95% (dejando eslabones unidos arriba y abajo)
            const topOpen = 5 + (45 * openProgress);    // De 5% a 50%
            const bottomOpen = 95 - (45 * openProgress); // De 95% a 50%
            
            // Separación lateral de las mitades
            const lateralSeparation = 30 * openProgress; // Máximo 30px de separación
            
            // Clip-path para la mitad izquierda (se mueve a la izquierda)
            // polygon(izq-arriba, der-arriba, der-abajo, izq-abajo)
            zipperLeft.style.clipPath = `polygon(
                0 0, 
                calc(50% - ${lateralSeparation}px) ${topOpen}%, 
                calc(50% - ${lateralSeparation}px) ${bottomOpen}%, 
                0 100%
            )`;
            zipperLeft.style.transform = `translateX(calc(-50% - ${lateralSeparation/2}px))`;
            
            // Clip-path para la mitad derecha (se mueve a la derecha)
            zipperRight.style.clipPath = `polygon(
                calc(50% + ${lateralSeparation}px) ${topOpen}%, 
                100% 0, 
                100% 100%, 
                calc(50% + ${lateralSeparation}px) ${bottomOpen}%
            )`;
            zipperRight.style.transform = `translateX(calc(-50% + ${lateralSeparation/2}px))`;

            // === MONSTRUO ===
            // Aparece cuando la cremallera empieza a abrirse
            const monsterProgress = easeOutExpo(Math.min(Math.max((progress - 0.15) / 0.55, 0), 1));
            monster.style.opacity = monsterProgress;
            monster.style.filter = `blur(${6 - 6 * monsterProgress}px)`;
            const monsterScale = 0.5 + 0.5 * monsterProgress;
            monster.style.transform = `translate(-50%, -50%) scale(${monsterScale})`;

            // === RESPLANDOR ===
            const glowProgress = easeOutCubic(Math.min(Math.max((progress - 0.3) / 0.4, 0), 1));
            glow.style.opacity = glowProgress * 0.5;
            glow.style.transform = `translate(-50%, -50%) scale(${1 + glowProgress * 0.8})`;

            // === FADE OUT AL FINAL ===
            if (progress >= 0.9) {
                const fadeOut = (progress - 0.9) / 0.1;
                animationWrapper.style.opacity = 1 - fadeOut;
            } else {
                animationWrapper.style.opacity = 1;
            }

            // Debug
            debug.innerHTML = `
                Progress: ${(progress * 100).toFixed(1)}%<br>
                Open: ${topOpen.toFixed(1)}% - ${bottomOpen.toFixed(1)}%<br>
                Separation: ${lateralSeparation.toFixed(1)}px<br>
                Monster: ${(monsterProgress * 100).toFixed(0)}%
            `;
        }

        // Throttle scroll
        let ticking = false;
        function onScroll() {
            if (!ticking) {
                requestAnimationFrame(() => {
                    updateAnimation();
                    ticking = false;
                });
                ticking = true;
            }
        }

        window.addEventListener('scroll', onScroll, { passive: true });
        window.addEventListener('resize', updateAnimation);
        
        // Init
        updateAnimation();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio - Cremallera Animada v4</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
            overflow-x: hidden;
        }

        .scroll-container {
            height: 200vh;
            position: relative;
        }

        .animation-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .zipper-container {
            position: relative;
            width: 350px;
            height: 75vh;
            max-height: 720px;
        }

        /* Resplandor */
        .glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(255,255,255,0.25) 0%, transparent 70%);
            border-radius: 50%;
            opacity: 0;
            z-index: 1;
        }

        /* Monstruo - cuerpo (detrás de la izquierda, delante de la derecha) */
        .monster {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.5);
            height: 70%;
            width: auto;
            opacity: 0;
            z-index: 8;
        }

        /* === CREMALLERA CERRADA === */
        .zipper-closed {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            height: 70%;
            z-index: 20;
        }

        .zipper-closed img {
            height: 100%;
            width: auto;
        }

        /* === CREMALLERA ABIERTA (con manos del monstruo) === */
        /* Lado izquierdo abierto - z-index alto (monstruo detrás) */
        .zipper-open-left {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-100%, -50%);
            height: 70%;
            opacity: 0;
            z-index: 15;
        }

        .zipper-open-left img {
            height: 100%;
            width: auto;
        }

        /* Lado derecho abierto - z-index bajo (monstruo delante) */
        .zipper-open-right {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-25%, -50%);
            height: 75%;
            opacity: 0;
            z-index: 5;
        }

        .zipper-open-right img {
            height: 100%;
            width: auto;
        }

        /* Tiradores del frame abierto (unen los extremos) */
        .zipper-open-pull {
            position: absolute;
            opacity: 0;
            z-index: 12;
        }

        .zipper-open-pull img {
            width: 100%;
            height: auto;
        }

        .zipper-open-pull-top {
            top: 0%;
            left: 8%;
            width: 50px;
        }

        .zipper-open-pull-bottom {
            bottom: -8%;
            left: 32%;
            width: 60px;
        }

        /* Indicador de scroll */
        .scroll-indicator {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            z-index: 100;
            transition: opacity 0.5s ease;
        }

        .scroll-indicator.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .scroll-indicator span {
            font-size: 12px;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.5);
        }

        .scroll-arrow {
            width: 24px;
            height: 24px;
            border-right: 2px solid rgba(255, 255, 255, 0.5);
            border-bottom: 2px solid rgba(255, 255, 255, 0.5);
            transform: rotate(45deg);
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: rotate(45deg) translateY(0); }
            40% { transform: rotate(45deg) translateY(8px); }
            60% { transform: rotate(45deg) translateY(4px); }
        }

        /* Barra de progreso */
        .progress-bar {
            position: fixed;
            top: 0;
            left: 0;
            height: 2px;
            background: #fff;
            width: 0%;
            z-index: 1000;
        }

        /* Contenido */
        .content-section {
            position: relative;
            z-index: 5;
            min-height: 100vh;
            padding: 50px;
            padding-top: 30vh;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
        }

        .content-section h1 {
            font-size: 3.5rem;
            margin-bottom: 20px;
            font-weight: 300;
            letter-spacing: 5px;
        }

        .content-section p {
            font-size: 1.1rem;
            max-width: 500px;
            line-height: 1.8;
            color: rgba(255, 255, 255, 0.6);
        }

        /* Debug */
        .debug {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            padding: 10px;
            font-size: 12px;
            font-family: monospace;
            z-index: 9999;
            border: 1px solid #333;
        }
    </style>
</head>
<body>
    <div class="progress-bar" id="progressBar"></div>

    <div class="scroll-container" id="scrollContainer">
        <div class="animation-wrapper" id="animationWrapper">
            <div class="zipper-container" id="zipperContainer">
                
                <!-- Resplandor (más atrás) -->
                <div class="glow" id="glow"></div>

                <!-- Lado derecho abierto con mano (z-index 5: monstruo por delante) -->
                <div class="zipper-open-right" id="zipperOpenRight">
                    <img src="file:///C:/Users/Usuario/Desktop/CV Y PORTFOLIO/PORTFOLIO 2026/animacion/frame abierto/lado der.svg" alt="">
                </div>

                <!-- Monstruo cuerpo (z-index 8: entre izq y der) -->
                <img class="monster" id="monster" 
                     src="file:///C:/Users/Usuario/Desktop/CV Y PORTFOLIO/PORTFOLIO 2026/animacion/frame abierto/montruo.svg" 
                     alt="Monstruo">

                <!-- Lado izquierdo abierto con mano (z-index 15: monstruo por detrás) -->
                <div class="zipper-open-left" id="zipperOpenLeft">
                    <img src="file:///C:/Users/Usuario/Desktop/CV Y PORTFOLIO/PORTFOLIO 2026/animacion/frame abierto/lado izq.svg" alt="">
                </div>

                <!-- Tiradores del frame abierto (unen arriba y abajo) -->
                <div class="zipper-open-pull zipper-open-pull-top" id="zipperOpenPullTop">
                    <img src="file:///C:/Users/Usuario/Desktop/CV Y PORTFOLIO/PORTFOLIO 2026/animacion/frame abierto/cremallera top.svg" alt="">
                </div>
                <div class="zipper-open-pull zipper-open-pull-bottom" id="zipperOpenPullBottom">
                    <img src="file:///C:/Users/Usuario/Desktop/CV Y PORTFOLIO/PORTFOLIO 2026/animacion/frame abierto/cremallera abajo.svg" alt="">
                </div>

                <!-- Cremallera cerrada (z-index 20: encima de todo al inicio) -->
                <div class="zipper-closed" id="zipperClosed">
                    <img src="file:///C:/Users/Usuario/Desktop/CV Y PORTFOLIO/PORTFOLIO 2026/animacion/frame cerrado/Recurso 6.svg" alt="">
                </div>

            </div>
        </div>
    </div>

    <div class="scroll-indicator" id="scrollIndicator">
        <span>Scroll</span>
        <div class="scroll-arrow"></div>
    </div>

    <div class="content-section" id="contentSection">
        <h1>BIENVENIDO</h1>
        <p>
            Soy un multidiseñador murciano apasionado por crear experiencias visuales únicas. 
            Explora mi portfolio y descubre mis trabajos.
        </p>
    </div>

    <div class="debug" id="debug"></div>

    <script>
        const scrollContainer = document.getElementById('scrollContainer');
        const animationWrapper = document.getElementById('animationWrapper');
        const monster = document.getElementById('monster');
        const glow = document.getElementById('glow');
        const zipperClosed = document.getElementById('zipperClosed');
        const zipperOpenLeft = document.getElementById('zipperOpenLeft');
        const zipperOpenRight = document.getElementById('zipperOpenRight');
        const zipperOpenPullTop = document.getElementById('zipperOpenPullTop');
        const zipperOpenPullBottom = document.getElementById('zipperOpenPullBottom');
        const progressBar = document.getElementById('progressBar');
        const scrollIndicator = document.getElementById('scrollIndicator');
        const debug = document.getElementById('debug');

        // Easing functions
        function easeOutCubic(t) {
            return 1 - Math.pow(1 - t, 3);
        }

        function easeInOutCubic(t) {
            return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
        }

        function easeOutExpo(t) {
            return t === 1 ? 1 : 1 - Math.pow(2, -10 * t);
        }

        function easeOutQuart(t) {
            return 1 - Math.pow(1 - t, 4);
        }

        function updateAnimation() {
            const scrollTop = window.scrollY;
            const scrollHeight = scrollContainer.offsetHeight - window.innerHeight;
            const progress = Math.min(Math.max(scrollTop / scrollHeight, 0), 1);
            
            progressBar.style.width = (progress * 100) + '%';

            // Ocultar indicador
            if (progress > 0.02) {
                scrollIndicator.classList.add('hidden');
            } else {
                scrollIndicator.classList.remove('hidden');
            }

            // === FASE 1: Cremallera cerrada se desvanece (0% - 50%) ===
            const closedFadeProgress = easeOutQuart(Math.min(Math.max(progress / 0.5, 0), 1));
            zipperClosed.style.opacity = 1 - closedFadeProgress;

            // === FASE 2: Lados abiertos con manos aparecen (20% - 70%) ===
            const openProgress = easeInOutCubic(Math.min(Math.max((progress - 0.2) / 0.5, 0), 1));
            
            // Lado izquierdo se mueve hacia la izquierda
            const leftOffset = 20 * openProgress; // Se separa hacia la izquierda
            zipperOpenLeft.style.opacity = openProgress;
            zipperOpenLeft.style.transform = `translate(calc(-100% - ${leftOffset}px), -50%)`;
            
            // Lado derecho se mueve hacia la derecha (empieza más cerca)
            const rightOffset = 10 * openProgress; // Se separa un poco
            zipperOpenRight.style.opacity = openProgress;
            zipperOpenRight.style.transform = `translate(calc(-25% + ${rightOffset}px), -50%)`;

            // Tiradores abiertos (unen los extremos)
            zipperOpenPullTop.style.opacity = openProgress;
            zipperOpenPullBottom.style.opacity = openProgress;

            // === FASE 3: Monstruo aparece (25% - 75%) ===
            const monsterProgress = easeOutExpo(Math.min(Math.max((progress - 0.25) / 0.5, 0), 1));
            monster.style.opacity = monsterProgress;
            monster.style.filter = `blur(${5 - 5 * monsterProgress}px)`;
            const monsterScale = 0.5 + 0.5 * monsterProgress;
            monster.style.transform = `translate(-50%, -50%) scale(${monsterScale})`;

            // === FASE 4: Resplandor ===
            const glowProgress = easeOutCubic(Math.min(Math.max((progress - 0.4) / 0.35, 0), 1));
            glow.style.opacity = glowProgress * 0.6;
            glow.style.transform = `translate(-50%, -50%) scale(${1 + glowProgress * 0.8})`;

            // === FADE OUT AL FINAL (95% - 100%) ===
            if (progress >= 0.95) {
                const fadeOut = (progress - 0.95) / 0.05;
                animationWrapper.style.opacity = 1 - fadeOut;
            } else {
                animationWrapper.style.opacity = 1;
            }

            // Debug
            debug.innerHTML = `
                Progress: ${(progress * 100).toFixed(1)}%<br>
                Closed: ${((1 - closedFadeProgress) * 100).toFixed(0)}%<br>
                Open: ${(openProgress * 100).toFixed(0)}%<br>
                Monster: ${(monsterProgress * 100).toFixed(0)}%
            `;
        }

        // Throttle scroll
        let ticking = false;
        function onScroll() {
            if (!ticking) {
                requestAnimationFrame(() => {
                    updateAnimation();
                    ticking = false;
                });
                ticking = true;
            }
        }

        window.addEventListener('scroll', onScroll, { passive: true });
        window.addEventListener('resize', updateAnimation);
        
        // Init
        updateAnimation();
    </script>
</body>
</html>

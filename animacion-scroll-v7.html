<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio - Cremallera Animada v7</title>
    <!-- ✦ TIPOGRAFÍA: Bebas Neue para display, DM Mono para detalles -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,300;0,400;1,300&family=Barlow+Condensed:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        /* ===== VARIABLES ===== */
        :root {
            --acid: #EEFF00;
            --acid-dim: rgba(238,255,0,0.15);
            --white: #fff;
            --black: #000;
            --grain-opacity: 0.045;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html { scroll-behavior: smooth; }

        /* ===== FONDO CON GRANO DE PELÍCULA ===== */
        body {
            background: #050505;
            font-family: 'Barlow Condensed', sans-serif;
            color: var(--white);
            overflow-x: hidden;
            cursor: none;
        }

        body::before {
            content: '';
            position: fixed;
            inset: -200%;
            width: 400%;
            height: 400%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
            background-size: 256px 256px;
            opacity: var(--grain-opacity);
            pointer-events: none;
            z-index: 9998;
            animation: grainShift 0.12s steps(1) infinite;
        }

        @keyframes grainShift {
            0%  { transform: translate(0,0); }
            10% { transform: translate(-5%,-10%); }
            20% { transform: translate(-15%,5%); }
            30% { transform: translate(7%,-25%); }
            40% { transform: translate(-5%,25%); }
            50% { transform: translate(-15%,10%); }
            60% { transform: translate(15%,0); }
            70% { transform: translate(0,15%); }
            80% { transform: translate(-10%,0); }
            90% { transform: translate(10%,5%); }
        }

        /* ===== CURSOR CUSTOM ===== */
        .cursor {
            position: fixed;
            width: 10px;
            height: 10px;
            background: var(--acid);
            border-radius: 50%;
            pointer-events: none;
            z-index: 99999;
            mix-blend-mode: difference;
            transition: transform 0.15s ease, width 0.15s ease, height 0.15s ease;
            transform: translate(-50%, -50%);
        }

        .cursor.grabbing {
            width: 40px;
            height: 40px;
            background: transparent;
            border: 2px solid var(--acid);
        }

        /* ===== BARRA PROGRESO ===== */
        .progress-bar {
            position: fixed;
            top: 0;
            left: 0;
            height: 2px;
            background: var(--acid);
            width: 0%;
            z-index: 1000;
        }

        /* ===== NAV ===== */
        .nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
        }

        .nav-logo { display: flex; align-items: center; gap: 0; }

        .nav-logo-box {
            display: flex;
            align-items: center;
            cursor: none;
            transition: transform 0.3s ease;
        }
        .nav-logo-box:hover { transform: scale(3); z-index: 9999; }
        .nav-logo-box img { width: 80px; height: auto; }

        .nav-logo-name {
            height: 100px;
            width: auto;
            filter: invert(1);
            cursor: none;
            margin-left: -35px;
            transition: transform 0.3s ease;
        }
        .nav-logo-name:hover { transform: scale(3); z-index: 9999; }

        .nav-links { display: flex; gap: 40px; }

        .nav-links a {
            color: var(--white);
            text-decoration: none;
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            font-weight: 300;
            letter-spacing: 3px;
            text-transform: uppercase;
            transition: color 0.2s ease;
            cursor: none;
        }
        .nav-links a:hover { color: var(--acid); }

        /* ===== SCROLL / ANIMATION ===== */
        .scroll-container {
            height: 100vh;
            position: relative;
        }

        .animation-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            padding-left: 10%;
            z-index: 5;
        }

        .zipper-container {
            position: relative;
            width: 550px;
            height: 95vh;
            max-height: 950px;
            cursor: none;
        }

        /* ===== HINT ===== */
        .zipper-hint {
            position: absolute;
            top: 5%;
            left: 130%;
            transform: translateX(-50%);
            font-family: 'Bebas Neue', sans-serif;
            font-size: 18px;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: var(--acid);
            z-index: 20;
            animation: hintPulse 2s ease-in-out infinite;
            white-space: nowrap;
        }

        .zipper-hint::before {
            content: '↑ ';
            display: inline-block;
            animation: arrowBounce 1s ease-in-out infinite;
        }

        @keyframes arrowBounce {
            0%, 100% { transform: translateY(0); }
            50%       { transform: translateY(-4px); }
        }

        @keyframes hintPulse {
            0%, 100% { opacity: 0.3; }
            50%       { opacity: 1; }
        }

        /* ===== GLOW ===== */
        .glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 450px;
            height: 450px;
            background: radial-gradient(circle, rgba(238,255,0,0.12) 0%, transparent 70%);
            border-radius: 50%;
            opacity: 0;
            z-index: 1;
        }

        /* ===== FRAMES ===== */
        .frame {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            height: 100%;
            z-index: 5;
            opacity: 0;
            transition: opacity 0.04s ease;
        }
        .frame img { height: 100%; width: auto; }
        .frame.active { opacity: 1; }

        /* ===== RIPPLE ===== */
        .zip-ripple {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 300px;
            height: 300px;
            border: 2px solid var(--acid);
            border-radius: 50%;
            opacity: 0;
            z-index: 2;
            pointer-events: none;
        }

        .zip-ripple.fire {
            animation: rippleFire 0.6s ease-out forwards;
        }

        @keyframes rippleFire {
            0%   { transform: translate(-50%,-50%) scale(0);   opacity: 0.8; }
            100% { transform: translate(-50%,-50%) scale(2.5); opacity: 0; }
        }

        /* ===== HERO TEXT ===== */
        .hero-text {
            position: fixed;
            top: 50%;
            right: 3%;
            transform: translateY(-50%);
            z-index: 1;
            width: 55%;
            max-width: 750px;
            pointer-events: none;
            transition: opacity 0.3s ease;
            text-align: center;
        }

        .hero-svg { width: 100%; height: auto; margin-bottom: 30px; }

        .hero-text p {
            font-family: 'DM Mono', monospace;
            font-style: italic;
            font-size: 0.95rem;
            line-height: 1.9;
            color: rgba(255,255,255,0.55);
            letter-spacing: 0.5px;
        }

        /* ===== CONTENIDO ===== */
        .content-section {
            position: relative;
            z-index: 10;
            min-height: 200vh;
            padding: 50px;
            padding-top: 50px;
            background: transparent;
        }

        .content-header { display: none; }

        /* ===== PORTFOLIO ===== */
        .portfolio-container {
            position: relative;
            width: 100%;
            height: 150vh;
            margin-top: 50px;
        }

        .portfolio-item {
            position: absolute;
            cursor: none;
            z-index: 1;
            user-select: none;
            opacity: 0;
        }

        .portfolio-item.entered {
            transition: box-shadow 0.2s ease;
        }

        .portfolio-item:active {
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
        }

        .portfolio-item:hover { z-index: 100; }

        .portfolio-item:hover img,
        .portfolio-item:hover video {
            box-shadow: 0 12px 50px rgba(238,255,0,0.15), 0 0 0 1px rgba(238,255,0,0.2);
            filter: brightness(1.05) contrast(1.02);
        }

        .portfolio-item img {
            display: block;
            max-width: 100%;
            height: auto;
            -webkit-user-drag: none;
            transition: box-shadow 0.3s ease, filter 0.3s ease;
        }

        .portfolio-item video {
            display: block;
            max-width: 100%;
            height: auto;
            -webkit-user-drag: none;
            border-radius: 2px;
            transition: box-shadow 0.3s ease, filter 0.3s ease;
        }

        /* ===== LIGHTBOX ===== */
        .lightbox {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.96);
            z-index: 10000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        .lightbox.active { display: flex; }

        .lightbox-close {
            position: absolute;
            top: 30px;
            right: 40px;
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            letter-spacing: 4px;
            color: var(--acid);
            cursor: none;
            z-index: 10001;
            transition: opacity 0.3s ease;
            text-transform: uppercase;
        }
        .lightbox-close:hover { opacity: 0.5; }

        .lightbox-content {
            max-width: 85%;
            max-height: 80%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .lightbox-content img { max-width: 100%; max-height: 80vh; object-fit: contain; }

        .lightbox-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-family: 'Bebas Neue', sans-serif;
            font-size: 40px;
            color: var(--white);
            cursor: none;
            padding: 20px;
            transition: color 0.2s ease;
            user-select: none;
        }
        .lightbox-nav:hover { color: var(--acid); }
        .lightbox-prev { left: 30px; }
        .lightbox-next { right: 30px; }

        .lightbox-counter {
            position: absolute;
            bottom: 30px;
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            letter-spacing: 3px;
            color: rgba(255,255,255,0.4);
        }

        /* ===== SCROLL INDICATOR ===== */
        .scroll-indicator {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            transition: opacity 0.5s ease;
        }
        .scroll-indicator.hidden { opacity: 0; pointer-events: none; }

        /* ===== DEBUG ===== */
        .debug {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            padding: 10px;
            font-size: 11px;
            font-family: 'DM Mono', monospace;
            z-index: 9999;
            border: 1px solid #222;
            color: rgba(255,255,255,0.4);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .nav { padding: 10px 15px; }
            .nav-logo-box img { width: 50px; }
            .nav-logo-name { height: 60px; margin-left: -20px; }
            .nav-links { gap: 20px; }
            .nav-links a { font-size: 10px; }

            .animation-wrapper { padding-left: 0; justify-content: center; }
            .zipper-container { width: 250px; height: 60vh; max-height: 500px; }
            .glow { width: 200px; height: 200px; }

            .zipper-hint {
                top: auto;
                bottom: -8%;
                left: 50%;
                transform: translateX(-50%);
                font-size: 13px;
            }

            .hero-text {
                position: fixed;
                top: auto;
                bottom: 5%;
                right: 50%;
                transform: translateX(50%);
                width: 90%;
                max-width: none;
            }
            .hero-svg { width: 80%; margin: 0 auto 15px; display: block; }
            .hero-text p { font-size: 0.78rem; }

            .content-section { padding: 20px; min-height: auto; }
            .portfolio-container {
                height: auto;
                min-height: auto;
                display: flex;
                flex-direction: column;
                gap: 20px;
                padding-bottom: 40px;
            }
            .portfolio-item {
                position: relative !important;
                left: auto !important;
                top: auto !important;
                width: 100% !important;
                cursor: default;
            }
            .portfolio-item video,
            .portfolio-item img { width: 100%; height: auto; border-radius: 4px; }
            .debug { display: none; }
        }
    </style>
</head>

    <script>
    // ================================================================
    //  CURSOR CUSTOM
    // ================================================================
    const cursor = document.getElementById('cursor');

    document.addEventListener('mousemove', e => {
        cursor.style.left = e.clientX + 'px';
        cursor.style.top  = e.clientY + 'px';
    });

    // ================================================================
    //  SONIDO SINTÉTICO DE CREMALLERA (Web Audio API)
    // ================================================================
    let audioCtx = null;
    let lastZipSoundTime = 0;

    function getAudioCtx() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        return audioCtx;
    }

    function playZipTick(intensity) {
        try {
            const ctx = getAudioCtx();
            if (ctx.state === 'suspended') ctx.resume();
            const now = ctx.currentTime;
            const bufferSize = Math.floor(ctx.sampleRate * 0.015);
            const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufferSize, 2);
            }
            const source = ctx.createBufferSource();
            source.buffer = buffer;
            const filter = ctx.createBiquadFilter();
            filter.type = 'bandpass';
            filter.frequency.value = 3500 + intensity * 2000;
            filter.Q.value = 1.5;
            const gainNode = ctx.createGain();
            gainNode.gain.setValueAtTime(0.18 + intensity * 0.12, now);
            gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.015);
            source.connect(filter);
            filter.connect(gainNode);
            gainNode.connect(ctx.destination);
            source.start(now);
        } catch(e) {}
    }

    function playZipFinal() {
        try {
            const ctx = getAudioCtx();
            if (ctx.state === 'suspended') ctx.resume();
            const osc = ctx.createOscillator();
            const gainNode = ctx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(800, ctx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(200, ctx.currentTime + 0.25);
            gainNode.gain.setValueAtTime(0.06, ctx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.25);
            osc.connect(gainNode);
            gainNode.connect(ctx.destination);
            osc.start();
            osc.stop(ctx.currentTime + 0.25);
        } catch(e) {}
    }

    function hapticTick() {
        if (navigator.vibrate) navigator.vibrate(2);
    }

    // ================================================================
    //  ANIMACIÓN CREMALLERA
    // ================================================================
    const frames = [
        document.getElementById('frame0'),
        document.getElementById('frame1'),
        document.getElementById('frame2'),
        document.getElementById('frame3'),
        document.getElementById('frame4'),
        document.getElementById('frame5'),
        document.getElementById('frame6'),
        document.getElementById('frame7')
    ];

    const totalFrames = frames.length;
    let currentFrame  = 0;

    const progressBar     = document.getElementById('progressBar');
    const scrollIndicator = document.getElementById('scrollIndicator');
    const debug           = document.getElementById('debug');
    const zipperHint      = document.getElementById('zipperHint');
    const zipperContainer = document.getElementById('zipperContainer');
    const glow            = document.getElementById('glow');
    const zipRipple       = document.getElementById('zipRipple');

    let zipperProgress    = 0;
    let isDraggingZipper  = false;
    let dragStartY        = 0;
    let dragStartProgress = 0;
    let portfolioRevealed = false;

    function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }

    function triggerRipple() {
        zipRipple.classList.remove('fire');
        void zipRipple.offsetWidth;
        zipRipple.classList.add('fire');
    }

    function updateAnimation(progress) {
        progress = Math.max(0, Math.min(1, progress));
        progressBar.style.width = (progress * 100) + '%';

        if (progress > 0.02) {
            zipperHint.style.opacity = '0';
            zipperHint.style.transition = 'opacity 0.3s ease';
        } else {
            zipperHint.style.opacity = '';
        }

        const frameProgress = Math.min(progress / 0.85, 1);
        const targetFrame   = Math.min(Math.floor(frameProgress * totalFrames), totalFrames - 1);

        if (targetFrame !== currentFrame) {
            const now = performance.now();
            if (now - lastZipSoundTime > 30) {
                playZipTick(frameProgress);
                hapticTick();
                lastZipSoundTime = now;
            }
            frames[currentFrame].classList.remove('active');
            frames[targetFrame].classList.add('active');

            if (targetFrame === totalFrames - 1 && currentFrame !== totalFrames - 1) {
                triggerRipple();
                playZipFinal();
            }
            currentFrame = targetFrame;
        }

        const glowProgress = easeOutCubic(Math.min(Math.max((progress - 0.4) / 0.4, 0), 1));
        glow.style.opacity   = glowProgress * 0.8;
        glow.style.transform = `translate(-50%,-50%) scale(${1 + glowProgress * 0.4})`;

        if (progress >= 0.99 && !portfolioRevealed) {
            portfolioRevealed = true;
            revealPortfolio();
        }

        debug.innerHTML = `progress: ${(progress * 100).toFixed(1)}%<br>frame: ${currentFrame + 1}/${totalFrames}`;
    }

    // ================================================================
    //  DRAG CREMALLERA
    // ================================================================
    function onZipperStart(e) {
        isDraggingZipper  = true;
        dragStartY        = e.clientY || e.touches[0].clientY;
        dragStartProgress = zipperProgress;
        cursor.classList.add('grabbing');
        e.preventDefault();
        e.stopPropagation();
    }

    function onZipperMove(e) {
        if (!isDraggingZipper) return;
        const clientY = e.clientY || (e.touches && e.touches[0].clientY);
        if (clientY === undefined) return;
        const containerHeight = zipperContainer.offsetHeight;
        const deltaY          = dragStartY - clientY;
        const deltaProgress   = deltaY / (containerHeight * 0.8);
        zipperProgress = Math.max(0, Math.min(1, dragStartProgress + deltaProgress));
        updateAnimation(zipperProgress);
    }

    function onZipperEnd() {
        isDraggingZipper = false;
        cursor.classList.remove('grabbing');
    }

    zipperContainer.addEventListener('mousedown',  onZipperStart);
    zipperContainer.addEventListener('touchstart', onZipperStart, { passive: false });
    document.addEventListener('mousemove',  onZipperMove);
    document.addEventListener('touchmove',  onZipperMove, { passive: false });
    document.addEventListener('mouseup',    onZipperEnd);
    document.addEventListener('touchend',   onZipperEnd);

    updateAnimation(0);

    // ================================================================
    //  REVEAL PORTFOLIO — CAOS CONTROLADO
    // ================================================================
    function revealPortfolio() {
        const items = document.querySelectorAll('.portfolio-item');
        items.forEach((item) => {
            const delay  = parseInt(item.dataset.delay) || 0;
            const dirX   = (Math.random() - 0.5) * 160;
            const dirY   = -80 - Math.random() * 120;
            const rot    = (Math.random() - 0.5) * 14;
            const scale  = 0.75 + Math.random() * 0.15;

            item.style.opacity   = '0';
            item.style.transform = `translate(${dirX}px, ${dirY}px) rotate(${rot}deg) scale(${scale})`;
            item.style.transition = 'none';

            setTimeout(() => {
                item.style.transition = `
                    opacity 0.55s cubic-bezier(0.22,1,0.36,1),
                    transform 0.65s cubic-bezier(0.22,1,0.36,1)
                `;
                const finalRot = (Math.random() - 0.5) * 4;
                item.style.opacity   = '1';
                item.style.transform = `rotate(${finalRot}deg)`;

                setTimeout(() => item.classList.add('entered'), 700);
            }, delay);
        });
    }

    // ================================================================
    //  DRAG & DROP PORTFOLIO
    // ================================================================
    var dragItem = null;
    var startX, startY, startLeft, startTop;

    document.addEventListener('mousedown', function(e) {
        if (isDraggingZipper) return;
        var target = e.target.closest('.portfolio-item');
        if (target) {
            dragItem  = target;
            startX    = e.pageX;
            startY    = e.pageY;
            startLeft = dragItem.offsetLeft;
            startTop  = dragItem.offsetTop;
            dragItem.style.zIndex     = 9999;
            dragItem.style.transform  = 'rotate(0deg) scale(1.03)';
            dragItem.style.transition = 'transform 0.15s ease';
            e.preventDefault();
            return;
        }
        if (window.scrollY < window.innerHeight && !e.target.closest('.nav') && !e.target.closest('.lightbox')) {
            onZipperStart(e);
        }
    });

    document.addEventListener('mousemove', function(e) {
        if (isDraggingZipper) return;
        if (dragItem) {
            dragItem.style.left = (startLeft + e.pageX - startX) + 'px';
            dragItem.style.top  = (startTop  + e.pageY - startY) + 'px';
        }
    });

    document.addEventListener('mouseup', function() {
        if (dragItem) {
            const rot = (Math.random() - 0.5) * 5;
            dragItem.style.transition = 'transform 0.2s ease';
            dragItem.style.transform  = `rotate(${rot}deg) scale(1)`;
            dragItem = null;
        }
    });

    // ================================================================
    //  AUTOPLAY VIDEOS
    // ================================================================
    document.querySelectorAll('.video-item video').forEach(v => v.play());

    // ================================================================
    //  LIGHTBOX
    // ================================================================
    var galleryImages   = ['1.png','2.jpg','5.png','6.png','7.png','8.png','grafica1.png','duende.png'];
    var currentImgIdx   = 0;
    var lightbox        = document.getElementById('lightbox');
    var lightboxImg     = document.getElementById('lightboxImg');
    var lightboxCounter = document.getElementById('lightboxCounter');

    function openLightbox()  { currentImgIdx = 0; updateLB(); lightbox.classList.add('active'); }
    function closeLightbox() { lightbox.classList.remove('active'); }
    function updateLB()      { lightboxImg.src = galleryImages[currentImgIdx]; lightboxCounter.textContent = (currentImgIdx+1)+' / '+galleryImages.length; }
    function nextImg()       { currentImgIdx = (currentImgIdx+1) % galleryImages.length; updateLB(); }
    function prevImg()       { currentImgIdx = (currentImgIdx-1+galleryImages.length) % galleryImages.length; updateLB(); }

    document.getElementById('lightboxClose').addEventListener('click', closeLightbox);
    document.getElementById('lightboxNext').addEventListener('click', nextImg);
    document.getElementById('lightboxPrev').addEventListener('click', prevImg);
    lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });
    document.addEventListener('keydown', e => {
        if (!lightbox.classList.contains('active')) return;
        if (e.key === 'Escape')     closeLightbox();
        if (e.key === 'ArrowRight') nextImg();
        if (e.key === 'ArrowLeft')  prevImg();
    });
    </script>
</body>
</html>

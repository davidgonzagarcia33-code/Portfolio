<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio - Cremallera Animada v5</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
            overflow-x: hidden;
        }

        .scroll-container {
            height: 200vh;
            position: relative;
        }

        .animation-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .zipper-container {
            position: relative;
            width: 400px;
            height: 80vh;
            max-height: 750px;
        }

        /* Resplandor */
        .glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, transparent 70%);
            border-radius: 50%;
            opacity: 0;
            z-index: 1;
        }

        /* Frame cerrado */
        .frame-closed {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            height: 90%;
            z-index: 10;
            transition: opacity 0.1s ease;
        }

        .frame-closed img {
            height: 100%;
            width: auto;
        }

        /* Frame abierto (con monstruo, manos y tiradores) */
        .frame-open {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            height: 90%;
            z-index: 5;
            opacity: 0;
            transition: opacity 0.1s ease;
        }

        .frame-open img {
            height: 100%;
            width: auto;
        }

        /* Indicador de scroll */
        .scroll-indicator {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            z-index: 100;
            transition: opacity 0.5s ease;
        }

        .scroll-indicator.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .scroll-indicator span {
            font-size: 12px;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.5);
        }

        .scroll-arrow {
            width: 24px;
            height: 24px;
            border-right: 2px solid rgba(255, 255, 255, 0.5);
            border-bottom: 2px solid rgba(255, 255, 255, 0.5);
            transform: rotate(45deg);
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: rotate(45deg) translateY(0); }
            40% { transform: rotate(45deg) translateY(8px); }
            60% { transform: rotate(45deg) translateY(4px); }
        }

        /* Barra de progreso */
        .progress-bar {
            position: fixed;
            top: 0;
            left: 0;
            height: 2px;
            background: #fff;
            width: 0%;
            z-index: 1000;
        }

        /* Contenido */
        .content-section {
            position: relative;
            z-index: 5;
            min-height: 100vh;
            padding: 50px;
            padding-top: 20vh;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
        }

        .content-section h1 {
            font-size: 4rem;
            margin-bottom: 20px;
            font-weight: 200;
            letter-spacing: 8px;
            text-transform: uppercase;
        }

        .content-section p {
            font-size: 1.1rem;
            max-width: 500px;
            line-height: 1.8;
            color: rgba(255, 255, 255, 0.6);
        }

        /* Debug */
        .debug {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            padding: 10px;
            font-size: 12px;
            font-family: monospace;
            z-index: 9999;
            border: 1px solid #333;
            display: none;
        }
    </style>
</head>
<body>
    <div class="progress-bar" id="progressBar"></div>

    <div class="scroll-container" id="scrollContainer">
        <div class="animation-wrapper" id="animationWrapper">
            <div class="zipper-container" id="zipperContainer">
                
                <!-- Resplandor -->
                <div class="glow" id="glow"></div>

                <!-- Frame abierto completo (monstruo + manos + tiradores) -->
                <div class="frame-open" id="frameOpen">
                    <img src="file:///C:/Users/Usuario/Desktop/CV Y PORTFOLIO/PORTFOLIO 2026/animacion/frame abierto/SVG/Recurso 7.svg" alt="Frame abierto">
                </div>

                <!-- Frame cerrado completo -->
                <div class="frame-closed" id="frameClosed">
                    <img src="file:///C:/Users/Usuario/Desktop/CV Y PORTFOLIO/PORTFOLIO 2026/animacion/frame cerrado/Recurso 6.svg" alt="Frame cerrado">
                </div>

            </div>
        </div>
    </div>

    <div class="scroll-indicator" id="scrollIndicator">
        <span>Scroll</span>
        <div class="scroll-arrow"></div>
    </div>

    <div class="content-section" id="contentSection">
        <h1>Bienvenido</h1>
        <p>
            Soy un multidiseñador murciano apasionado por crear experiencias visuales únicas. 
            Explora mi portfolio y descubre mis trabajos.
        </p>
    </div>

    <div class="debug" id="debug"></div>

    <script>
        const scrollContainer = document.getElementById('scrollContainer');
        const animationWrapper = document.getElementById('animationWrapper');
        const frameClosed = document.getElementById('frameClosed');
        const frameOpen = document.getElementById('frameOpen');
        const glow = document.getElementById('glow');
        const progressBar = document.getElementById('progressBar');
        const scrollIndicator = document.getElementById('scrollIndicator');
        const debug = document.getElementById('debug');

        // Easing functions
        function easeOutCubic(t) {
            return 1 - Math.pow(1 - t, 3);
        }

        function easeInOutCubic(t) {
            return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
        }

        function easeOutExpo(t) {
            return t === 1 ? 1 : 1 - Math.pow(2, -10 * t);
        }

        function updateAnimation() {
            const scrollTop = window.scrollY;
            const scrollHeight = scrollContainer.offsetHeight - window.innerHeight;
            const progress = Math.min(Math.max(scrollTop / scrollHeight, 0), 1);
            
            progressBar.style.width = (progress * 100) + '%';

            // Ocultar indicador
            if (progress > 0.02) {
                scrollIndicator.classList.add('hidden');
            } else {
                scrollIndicator.classList.remove('hidden');
            }

            // === Transición entre frame cerrado y abierto ===
            // Frame cerrado se desvanece (0% - 60%)
            const closedProgress = easeOutExpo(Math.min(Math.max(progress / 0.6, 0), 1));
            frameClosed.style.opacity = 1 - closedProgress;

            // Frame abierto aparece (20% - 80%)
            const openProgress = easeInOutCubic(Math.min(Math.max((progress - 0.2) / 0.6, 0), 1));
            frameOpen.style.opacity = openProgress;

            // Pequeña escala para dar sensación de profundidad
            const scale = 1 + (openProgress * 0.05);
            frameOpen.style.transform = `translate(-50%, -50%) scale(${scale})`;

            // === Resplandor ===
            const glowProgress = easeOutCubic(Math.min(Math.max((progress - 0.4) / 0.4, 0), 1));
            glow.style.opacity = glowProgress * 0.5;
            glow.style.transform = `translate(-50%, -50%) scale(${1 + glowProgress * 0.5})`;

            // === FADE OUT AL FINAL (92% - 100%) ===
            if (progress >= 0.92) {
                const fadeOut = (progress - 0.92) / 0.08;
                animationWrapper.style.opacity = 1 - fadeOut;
            } else {
                animationWrapper.style.opacity = 1;
            }

            // Debug
            debug.innerHTML = `
                Progress: ${(progress * 100).toFixed(1)}%<br>
                Closed: ${((1 - closedProgress) * 100).toFixed(0)}%<br>
                Open: ${(openProgress * 100).toFixed(0)}%
            `;
        }

        // Throttle scroll
        let ticking = false;
        function onScroll() {
            if (!ticking) {
                requestAnimationFrame(() => {
                    updateAnimation();
                    ticking = false;
                });
                ticking = true;
            }
        }

        window.addEventListener('scroll', onScroll, { passive: true });
        window.addEventListener('resize', updateAnimation);
        
        // Init
        updateAnimation();
    </script>
</body>
</html>
